<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Sathi ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:Arial, sans-serif;
text-align:center;
color:white;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
}

.container{
margin-top:40px;
}

h1{
font-size:45px;
animation:glow 2s infinite;
}

@keyframes glow{
50%{
text-shadow:0 0 30px white;
}
}

.photo{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
margin-top:20px;
border:5px solid white;
animation:zoom 3s infinite;
}

@keyframes zoom{
50%{
transform:scale(1.05);
}
}

.cake{
font-size:100px;
margin:20px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{
transform:translateY(0);
}
to{
transform:translateY(-20px);
}
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
background:#ff4081;
color:white;
font-size:18px;
cursor:pointer;
}

.message{
display:none;
margin:25px;
font-size:22px;
line-height:1.5;
animation:fade 2s;
}

@keyframes fade{
from{
opacity:0;
}
to{
opacity:1;
}
}

.heart{
position:absolute;
font-size:25px;
animation:fall 5s linear infinite;
}

@keyframes fall{
from{
transform:translateY(-100px);
}
to{
transform:translateY(800px);
}
}
</style>

</head>

<body>

<audio autoplay loop>
<source src="Song.mp3" type="audio/mp3">
</audio>

<div class="container">

<h1>🎉 Happy Birthday Sathi ❤️</h1>

<img src="KO.jpg" class="photo">

<div class="cake">🎂</div>

<h2>🕯️ Make a Wish 🕯️</h2>

<button onclick="cutCake()">Cut The Cake 🎂</button>

<div class="message" id="msg">

💖 Happy Birthday My Dear Sathi 💖<br><br>

May your life always be full of happiness,
success and beautiful memories ✨<br><br>

Enjoy your special day 🎁❤️

</div>

</div>


<script>

function cutCake(){
document.getElementById("msg").style.display="block";
alert("🎂 Cake Cut Done! Happy Birthday ❤️");
}

function hearts(){

let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},5000);

}

setInterval(hearts,300);

</script>

</body>
</html>
